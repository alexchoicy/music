[package]
name = "upload"
version = "1.0.0"
edition = "2024"

[lib]
name = "upload"
path = "src/lib.rs"

[dependencies]
tokio = { version = "1", features = ["rt-multi-thread", "macros", "time"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
http = "1.3.1"
reqwest = { version = "0.12", features = ["json"] }
blake3 = "1.8.3"
thiserror = "2"
