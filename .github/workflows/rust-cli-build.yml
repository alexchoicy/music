name: Rust CLI Build

on:
  push:
    tags:
      - "v*.*.*"
      - "presence_cli@v*.*.*"
      - "upload_cli@v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: rust-cli-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_music_presence:
    if: |
      !startsWith(github.ref, 'refs/tags/') ||
      startsWith(github.ref_name, 'v') ||
      startsWith(github.ref_name, 'presence_cli@v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
            platform_id: linux-x64
            binary: music_presence_cli
          - platform: windows-latest
            platform_id: windows-x64
            binary: music_presence_cli.exe

    runs-on: ${{ matrix.platform }}
    defaults:
      run:
        working-directory: desktop

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "desktop -> target"

      - name: Build release binary
        run: cargo build --package music_presence_cli --release --locked

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: music_presence_cli-${{ matrix.platform_id }}
          path: desktop/target/release/${{ matrix.binary }}
          if-no-files-found: error

  build_upload:
    if: |
      !startsWith(github.ref, 'refs/tags/') ||
      startsWith(github.ref_name, 'v') ||
      startsWith(github.ref_name, 'upload_cli@v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
            platform_id: linux-x64
            binary: upload_cli
          - platform: windows-latest
            platform_id: windows-x64
            binary: upload_cli.exe

    runs-on: ${{ matrix.platform }}
    defaults:
      run:
        working-directory: desktop

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "desktop -> target"

      - name: Build release binary
        run: cargo build --package upload_cli --release --locked

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: upload_cli-${{ matrix.platform_id }}
          path: desktop/target/release/${{ matrix.binary }}
          if-no-files-found: error

  release_music_presence:
    runs-on: ubuntu-latest
    needs: build_music_presence
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: music_presence_cli-*
          path: dist
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release_upload:
    runs-on: ubuntu-latest
    needs: build_upload
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: upload_cli-*
          path: dist
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
