name: Rust CLI Build

on:
  push:
    branches: ["master"]
    paths:
      - "desktop/**"
      - ".github/workflows/rust-*.yml"
    tags:
      - "v*.*.*"
      - "music_presence_cli@v*.*.*"
      - "presence_cli@v*.*.*"
      - "upload_cli@v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: rust-cli-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "ubuntu-latest"
            platform_id: "linux-x64"
            package: "music_presence_cli"
            binary: "music_presence_cli"
          - platform: "windows-latest"
            platform_id: "windows-x64"
            package: "music_presence_cli"
            binary: "music_presence_cli.exe"
          - platform: "ubuntu-latest"
            platform_id: "linux-x64"
            package: "upload_cli"
            binary: "upload_cli"
          - platform: "windows-latest"
            platform_id: "windows-x64"
            package: "upload_cli"
            binary: "upload_cli.exe"

    runs-on: ${{ matrix.platform }}
    if: |
      !startsWith(github.ref, 'refs/tags/') ||
      startsWith(github.ref_name, 'v') ||
      startsWith(github.ref_name, format('{0}@v', matrix.package)) ||
      (matrix.package == 'music_presence_cli' && startsWith(github.ref_name, 'presence_cli@v'))
    defaults:
      run:
        working-directory: desktop
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "desktop -> target"

      - name: Build release binary
        run: cargo build --package ${{ matrix.package }} --release --locked

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.package }}-${{ matrix.platform_id }}
          path: desktop/target/release/${{ matrix.binary }}
          if-no-files-found: error

  releases:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v5
        with:
          path: dist

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
